<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Attendance Calculator</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Attendance Tracker</h1>

<input type="number" id="total" placeholder="Total Classes">

<input type="number" id="present" placeholder="Total Present">

<input type="number" id="bunk" placeholder="Classes you will bunk">

<button onclick="calculate()">Calculate</button>

<div class="progress">

<div id="bar"></div>

</div>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
